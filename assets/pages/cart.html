<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackMarket - Carrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/cart.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="top-bar">
        <button class="back-btn" onclick="history.back()">← Volver</button>
        <span class="page-title">Carrito de Compra</span>
      </header>

      <div class="main-grid">
        <section class="card productos-panel">
          <h3 class="panel-title">
            Productos Seleccionados (<span id="totalItems">0</span>)
          </h3>
          <hr class="divider" />
          <div id="listaProductos"></div>
          <div id="emptyCart" class="empty-cart" style="display: none">
            <p>No hay productos en el carrito.</p>
          </div>
        </section>

        <section class="card resumen-panel">
          <h3 class="panel-title">Resumen del pedido</h3>
          <hr class="divider" />
          <div class="resumen-row">
            <span>Subtotal</span>
            <span id="subtotal">S/ 0.00</span>
          </div>
          <div class="resumen-row">
            <span>Envío</span>
            <span>S/ 10.00</span>
          </div>
          <hr class="divider" />
          <div class="resumen-row total-row">
            <span>Total</span>
            <span id="total">S/ 10.00</span>
          </div>
          <p class="direccion-label">Dirección de Entrega</p>
          <div class="direccion-box" id="direccionBox">
            <span id="direccionText">—</span>
          </div>
          <button class="btn-completar" onclick="completarCompra()">
            Completar Compra
          </button>
        </section>
      </div>

      <section class="card pago-panel">
        <h3 class="panel-title">Datos de Pago</h3>
        <hr class="divider" />
        <label class="field-label">Número de Tarjeta</label>
        <input
          type="text"
          id="numTarjeta"
          class="field-input"
          placeholder="0000 0000 0000 0000"
          maxlength="19"
          oninput="formatearTarjeta(this)"
        />
        <div class="two-cols">
          <div>
            <label class="field-label">Vencimiento</label>
            <input
              type="text"
              id="vencimiento"
              class="field-input"
              placeholder="MM / AA"
              maxlength="7"
              oninput="formatearVencimiento(this)"
            />
          </div>
          <div>
            <label class="field-label">CVV</label>
            <input
              type="password"
              id="cvv"
              class="field-input"
              placeholder="***"
              maxlength="3"
              oninput="this.value = this.value.replace(/\D/g, '')"
            />
          </div>
        </div>
      </section>
    </div>
    <script src="../../assets/javascript/cart.js"></script>
  </body>
</html>
