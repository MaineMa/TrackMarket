<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackMarket - Mis Compras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/orders.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="top-bar">
        <button class="back-btn" onclick="history.back()">← Volver</button>
        <span class="page-title">Mis Compras</span>
      </header>

      <nav class="tabs-row">
        <button
          class="tab-btn active"
          id="tabProceso"
          onclick="cambiarTab('proceso')"
        >
          En Proceso (<span id="countProceso">0</span>)
        </button>
        <button
          class="tab-btn"
          id="tabCompletadas"
          onclick="cambiarTab('completadas')"
        >
          Completadas (<span id="countCompletadas">0</span>)
        </button>
      </nav>

      <div id="listaProceso" class="ordenes-list"></div>
      <div
        id="listaCompletadas"
        class="ordenes-list"
        style="display: none"
      ></div>

      <div id="emptyState" class="empty-state" style="display: none">
        <p id="emptyMsg">No tienes compras en proceso.</p>
      </div>
    </div>

    <script src="../../assets/javascript/orders.js"></script>
  </body>
</html>
